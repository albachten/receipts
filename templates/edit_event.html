{% extends "base.html" %}
{% block title %}Edit {{ event.name }} — Expense Manager{% endblock %}

{% block extra_head %}
<style>
  .back { color: #64748b; text-decoration: none; font-size: 0.875rem; display: inline-block; margin-bottom: 0.25rem; }
  .back:hover { color: #1e293b; }
</style>
{% endblock %}

{% block content %}
<a class="back" href="{% url 'event_detail' event.pk %}">← {{ event.name }}</a>
<h2 style="margin:.5rem 0 1.5rem">Edit Event</h2>

{% if error %}<div class="error-box">{{ error }}</div>{% endif %}

<form method="post" class="form">
  {% csrf_token %}
  <label>Name
    <input type="text" name="name" value="{{ event.name }}" required autofocus>
  </label>
  <label>Description
    <textarea name="description" rows="3">{{ event.description }}</textarea>
  </label>
  <div style="display:flex;gap:0.5rem">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'event_detail' event.pk %}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
