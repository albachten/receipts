<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Expense Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; color: #1e293b; }
    .sub { color: #64748b; font-size: 0.875rem; margin: 0 0 1.25rem; }
    .error-box { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.875rem; margin-bottom: 0.75rem; }
    label { display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.75rem; }
    input { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 0.9rem; width: 100%; }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    button { width: 100%; background: #3b82f6; color: white; border: none; border-radius: 4px; padding: 0.65rem; font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-top: 0.25rem; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Expense Manager</h1>
    <p class="sub">Sign in to continue</p>
    {% if error %}<p class="error-box">{{ error }}</p>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>Username<input type="text" name="username" autofocus required></label>
      <label>Password<input type="password" name="password" required></label>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
